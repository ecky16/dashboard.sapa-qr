<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dasboard SAPA=QR - Telkom Akses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 relative min-h-screen pb-10">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-11/12 max-w-md border-t-8 border-red-600 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 text-slate-100 text-9xl opacity-20"><i class="fas fa-shield-alt"></i></div>
            
            <div class="relative z-10 flex flex-col items-center">
                <img src="logo.png" alt="Logo TA" class="h-16 w-auto mb-4 object-contain" onerror="this.style.display='none'">
                
                <h2 class="text-2xl font-black text-center text-slate-800 uppercase tracking-tight mb-1">Secure Portal</h2>
                <p class="text-center text-slate-400 text-[11px] font-bold uppercase tracking-widest mb-8">SAPA-QR Dashboard</p>

                <div class="space-y-4 w-full">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Username</label>
                        <input type="text" id="username" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-4 focus:ring-red-100 focus:border-red-500 transition-all font-bold text-slate-700" placeholder="Masukkan Username">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Password</label>
                        <input type="password" id="password" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-4 focus:ring-red-100 focus:border-red-500 transition-all font-bold text-slate-700" placeholder="••••••••" onkeypress="if(event.key === 'Enter') doLogin()">
                    </div>
                    
                    <p id="login-error" class="text-red-500 text-[10px] font-black uppercase text-center hidden mt-2"><i class="fas fa-exclamation-circle"></i> Username / Password Salah!</p>

                    <button onclick="doLogin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black uppercase tracking-widest py-3 rounded-xl shadow-lg shadow-red-500/30 transition-all transform hover:scale-[1.02] mt-4">
                        Masuk Dashboard <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-content" class="hidden">
        <nav class="bg-red-600 text-white p-3 shadow-xl sticky top-0 z-50">
            <div class="container mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
                
                <div class="flex items-center gap-3 w-full lg:w-auto justify-center lg:justify-start">
                    <div class="bg-white p-1.5 rounded-lg shadow-inner">
                        <img src="logo.png" alt="Logo TA" class="h-8 w-auto object-contain" onerror="this.innerHTML='<i class=\'fas fa-users-viewfinder text-red-600\'></i>'">
                    </div>
                    <h1 class="text-lg md:text-xl font-extrabold tracking-tighter uppercase">Monitoring Dashboard SAPA-QR</h1>
                </div>

                <div class="flex items-center gap-2 bg-red-700 px-3 py-2 rounded-xl border border-red-400 flex-wrap justify-center">
                    <div class="flex items-center gap-2">
                        <i class="far fa-calendar-alt text-red-200 text-sm"></i>
                        <input type="date" id="filter-start" onchange="bypassDate = false; processData()" class="bg-transparent outline-none cursor-pointer text-white font-bold text-[11px] md:text-xs">
                    </div>
                    <span class="text-red-300 font-black text-xs">-</span>
                    <div class="flex items-center gap-2">
                        <input type="date" id="filter-end" onchange="bypassDate = false; processData()" class="bg-transparent outline-none cursor-pointer text-white font-bold text-[11px] md:text-xs">
                    </div>
                    
                    <div class="h-6 w-[1px] bg-red-500 mx-1 hidden sm:block"></div>
                    
                    <button onclick="showAllDates()" class="bg-white text-red-600 px-3 py-1 rounded-lg text-[9px] md:text-[10px] font-black uppercase shadow-sm hover:bg-red-50 transition-colors ml-1">Semua Waktu</button>
                    <button onclick="doLogout()" class="bg-red-900 text-white px-3 py-1 rounded-lg text-[9px] md:text-[10px] font-black uppercase hover:bg-slate-900 transition-colors ml-1" title="Keluar"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8 items-end">
                <div class="lg:col-span-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Service Area</label>
                    <select id="filter-area" onchange="processData()" class="w-full border-2 border-white p-3 rounded-2xl bg-white shadow-sm outline-none focus:ring-4 focus:ring-red-100 transition-all font-bold text-slate-700">
                        <option value="ALL">SEMUA AREA</option>
                    </select>
                </div>
                
                <div class="lg:col-span-3 grid grid-cols-2 md:grid-cols-3 gap-4 w-full">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-center">
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter">Total Masuk</p>
                        <p id="stat-masuk" class="text-4xl font-black text-blue-600">0</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-center">
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter text-red-400">Total Telat</p>
                        <p id="stat-telat" class="text-4xl font-black text-red-500">0</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-center col-span-2 md:col-span-1">
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter text-green-400">Sudah Pulang</p>
                        <p id="stat-pulang" class="text-4xl font-black text-green-600">0</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div class="p-6 bg-white border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <h2 class="font-black text-slate-800 uppercase text-sm tracking-widest flex items-center gap-2">
                            <span class="w-2 h-6 bg-red-600 rounded-full"></span> 📋 Log Absensi
                        </h2>
                        <span id="label-date" class="text-[10px] font-black bg-slate-100 text-slate-500 px-4 py-2 rounded-xl uppercase tracking-tighter text-center"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] uppercase bg-slate-50 text-slate-400 border-b font-black tracking-widest">
                                    <th class="p-6">Nama Teknisi</th>
                                    <th class="p-6 text-center">Area</th>
                                    <th class="p-6">Waktu Masuk</th>
                                    <th class="p-6">Status</th>
                                    <th class="p-6">Jam Kerja</th>
                                </tr>
                            </thead>
                            <tbody id="main-table" class="divide-y divide-slate-50 text-sm">
                                <tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold uppercase tracking-widest">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-200 text-center">
                        <h3 class="font-black text-green-700 text-xs uppercase tracking-widest mb-6 flex items-center gap-2 justify-center">
                            <i class="fas fa-trophy text-xl text-yellow-400"></i> Top 5 Terawal
                        </h3>
                        <div id="rank-early" class="space-y-4 text-left"></div>
                    </div>

                    <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-200 text-center">
                        <h3 class="font-black text-red-700 text-xs uppercase tracking-widest mb-6 flex items-center gap-2 justify-center">
                            <i class="fas fa-fire text-xl text-orange-500"></i> Top 5 Sering Telat
                        </h3>
                        <div id="rank-late" class="space-y-4 text-left"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="fixed bottom-2 right-4 text-[10px] font-black text-slate-400 opacity-60 tracking-widest uppercase pointer-events-none z-50">
        dashboard sapa-qr v1.2
    </div>

    <script>
        const correctUser = "admin";
        const correctPass = "anjay";

        window.onload = function() {
            if(sessionStorage.getItem("authTelkomAkses") === "true") {
                bukaDashboard();
            }
        };

        function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('login-error');

            if(u === correctUser && p === correctPass) {
                sessionStorage.setItem("authTelkomAkses", "true");
                err.classList.add('hidden');
                bukaDashboard();
            } else {
                err.classList.remove('hidden');
            }
        }

        function doLogout() {
            sessionStorage.removeItem("authTelkomAkses");
            location.reload();
        }

        function bukaDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            init(); 
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbwRgMKOgIY5SAR0AcUnhRbZDT5irDWpPYcP9WXgmUqVZmDkXgzV-vAopeFHZw_bIFYy8w/exec";
        let rawData = [];
        let bypassDate = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                rawData = await res.json();
                
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('filter-start').value = today;
                document.getElementById('filter-end').value = today;
                
                generateAreaFilter();
                processData();
            } catch (e) {
                console.error("API Error: ", e);
            }
        }

        function generateAreaFilter() {
            const select = document.getElementById('filter-area');
            const rawAreas = rawData.map(item => item.service_area || item.area).filter(a => a);
            const cleanAreas = rawAreas.map(a => String(a).trim().toUpperCase());
            const uniqueAreas = [...new Set(cleanAreas)];
            
            uniqueAreas.sort().forEach(areaName => {
                const opt = document.createElement('option');
                opt.value = areaName;
                opt.innerHTML = areaName;
                select.appendChild(opt);
            });
        }

        function showAllDates() {
            bypassDate = true;
            document.getElementById('filter-start').value = ""; 
            document.getElementById('filter-end').value = ""; 
            processData();
        }

        function getExactDate(i) {
            if (i.tahun && i.bulan && i.tanggal) {
                const y = String(i.tahun).replace(/\D/g, '');
                const m = String(i.bulan).replace(/\D/g, '').padStart(2, '0');
                const d = String(i.tanggal).replace(/\D/g, '').padStart(2, '0');
                if (y.length === 4) return `${y}-${m}-${d}`;
            }

            const fallbackVal = i.jam_absen || i.waktu_masuk;
            if (!fallbackVal) return null;
            
            const dObj = new Date(fallbackVal);
            if (!isNaN(dObj.getTime())) {
                return dObj.getFullYear() + "-" + 
                       String(dObj.getMonth() + 1).padStart(2, '0') + "-" + 
                       String(dObj.getDate()).padStart(2, '0');
            }
            return null;
        }

        function processData() {
            const area = document.getElementById('filter-area').value;
            const tglStart = document.getElementById('filter-start').value; 
            const tglEnd = document.getElementById('filter-end').value; 
            
            if (bypassDate) {
                document.getElementById('label-date').innerText = "MENAMPILKAN SEMUA DATA";
            } else {
                if(tglStart === tglEnd) {
                    document.getElementById('label-date').innerText = `TANGGAL: ${tglStart}`;
                } else {
                    document.getElementById('label-date').innerText = `PERIODE: ${tglStart} s/d ${tglEnd}`;
                }
            }

            const filteredData = rawData.filter(i => {
                const areaVal = String(i.service_area || i.area || "").trim().toUpperCase();
                const matchArea = area === "ALL" || areaVal === area;
                
                let matchDate = bypassDate;
                if (!matchDate) {
                    const itemDate = getExactDate(i);
                    if (itemDate && itemDate >= tglStart && itemDate <= tglEnd) {
                        matchDate = true;
                    }
                }
                
                return matchArea && matchDate;
            });

            renderUI(filteredData);
        }

        function renderUI(data) {
            document.getElementById('stat-masuk').innerText = data.length;
            document.getElementById('stat-telat').innerText = data.filter(i => String(i.status || i.keterangan || "").toUpperCase().includes("TELAT")).length;
            document.getElementById('stat-pulang').innerText = data.filter(i => i.waktu_pulang && String(i.waktu_pulang).trim() !== "").length;

            const tbody = document.getElementById('main-table');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-400 font-bold uppercase tracking-widest">TIDAK ADA DATA ABSENSI DI PERIODE INI.</td></tr>`;
            } else {
                tbody.innerHTML = data.map(i => {
                    let displayJam = '-';
                    if (i.jam_absen || i.waktu_masuk) {
                        const d = new Date(i.jam_absen || i.waktu_masuk);
                        displayJam = !isNaN(d.getTime()) ? d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : (i.jam_absen || i.waktu_masuk);
                    }

                    const statusVal = String(i.status || i.keterangan || "MASUK").toUpperCase();
                    const statusClass = statusVal.includes('TELAT') ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600';
                    const namaTeknisi = i.nama || i.nama_teknisi || i.nama_nama_telegram || "TANPA NAMA";
                    const areaTampil = String(i.service_area || i.area || '-').trim().toUpperCase();
                    
                    return `
                    <tr class="hover:bg-slate-50 transition-all border-b border-slate-50 group">
                        <td class="p-4 md:p-6 font-bold text-slate-700 uppercase text-[11px] md:text-[12px] group-hover:text-red-600">${namaTeknisi}</td>
                        <td class="p-4 md:p-6 text-center"><span class="text-[9px] md:text-[10px] bg-slate-100 px-2 py-1.5 rounded-lg font-black text-slate-500 uppercase">${areaTampil}</span></td>
                        <td class="p-4 md:p-6 text-slate-400 font-mono text-[10px] md:text-[11px] font-bold">${displayJam}</td>
                        <td class="p-4 md:p-6">
                            <span class="whitespace-nowrap px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-black ${statusClass}">${statusVal}</span>
                        </td>
                        <td class="p-4 md:p-6 font-black text-blue-600 text-[11px] md:text-[12px]">${i.waktu_kerja || i.durasi ? parseFloat(i.waktu_kerja || i.durasi).toFixed(2) : '0.00'} JAM</td>
                    </tr>`;
                }).join('');
            }

            const stats = {};
            const firstAbsen = {};
            
            data.forEach(i => {
                const n = i.nama || i.nama_nama_telegram;
                if(!n) return;
                
                if(!stats[n]) stats[n] = { telat: 0, early: 0 };
                if(String(i.status || i.keterangan || "").toUpperCase().includes("TELAT")) stats[n].telat++;
                
                const dateKey = getExactDate(i);
                if (dateKey && (i.jam_absen || i.waktu_masuk)) {
                    const dObj = new Date(i.jam_absen || i.waktu_masuk);
                    const tVal = !isNaN(dObj.getTime()) ? dObj.getTime() : parseInt(String(i.jam_absen).replace(/\D/g,''));
                    
                    if(!firstAbsen[dateKey] || tVal < firstAbsen[dateKey].time) {
                        firstAbsen[dateKey] = { name: n, time: tVal };
                    }
                }
            });
            
            Object.values(firstAbsen).forEach(f => { if(stats[f.name]) stats[f.name].early++ });
            const sortRank = (key) => Object.entries(stats).map(([name, s]) => ({ name, count: s[key] })).filter(u => u.count > 0).sort((a,b) => b.count - a.count).slice(0,5);

            document.getElementById('rank-early').innerHTML = sortRank('early').map(u => rankBox(u, 'green')).join('') || '<p class="text-center text-slate-300 text-[10px] py-4 uppercase font-bold">KOSONG</p>';
            document.getElementById('rank-late').innerHTML = sortRank('telat').map(u => rankBox(u, 'red')).join('') || '<p class="text-center text-slate-300 text-[10px] py-4 uppercase font-bold">KOSONG</p>';
        }

        function rankBox(u, color) {
            return `<div class="flex justify-between items-center bg-white p-3 rounded-xl border border-${color}-100 shadow-sm">
                <span class="text-[10px] font-black text-slate-700 uppercase">${u.name}</span>
                <span class="text-[10px] bg-${color}-600 text-white px-2 py-1 rounded-lg font-black">${u.count}x</span>
            </div>`;
        }
    </script>
</body>
</html>
